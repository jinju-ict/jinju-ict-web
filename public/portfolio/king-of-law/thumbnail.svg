<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(252 82% 60%)" />
      <stop offset="50%" stop-color="hsl(280 70% 55%)" />
      <stop offset="100%" stop-color="hsl(40 92% 52%)" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="15%" r="65%">
      <stop offset="0%" stop-color="hsl(252 82% 60%)" stop-opacity="0.45" />
      <stop offset="100%" stop-color="hsl(252 82% 60%)" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="gold" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="hsl(40 92% 52%)" stop-opacity="0.25" />
      <stop offset="100%" stop-color="hsl(40 92% 52%)" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="hsl(24 20% 6%)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect width="1200" height="630" fill="url(#gold)" />
  <rect x="80" y="76" width="100" height="2" fill="hsl(26 8% 50%)" />
  <text x="80" y="118" font-family="Pretendard Variable, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="20" font-weight="500" fill="hsl(26 8% 64%)" letter-spacing="6">KING OF LAW</text>
  <circle cx="104" cy="198" r="28" fill="url(#aurora)" />
  <text x="104" y="207" text-anchor="middle" font-family="Pretendard Variable, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="22" font-weight="700" fill="hsl(24 20% 6%)">왕</text>
  <text x="148" y="207" font-family="Pretendard Variable, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="28" font-weight="700" fill="hsl(40 20% 98%)">법률왕</text>
  <rect x="80" y="280" width="180" height="6" rx="3" fill="url(#aurora)" />
  <text x="80" y="410" font-family="Pretendard Variable, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="110" font-weight="700" letter-spacing="-4" fill="hsl(40 20% 98%)">법을 가장 가까이서.</text>
  <text x="80" y="490" font-family="Pretendard Variable, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="32" fill="hsl(26 8% 64%)">누구나 법을 익숙하게 만나는 인터랙티브 학습</text>
  <g transform="translate(80, 540)" font-family="Pretendard Variable, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="20" font-weight="500" fill="hsl(40 20% 98%)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="hsl(252 82% 60% / 0.15)" stroke="hsl(252 88% 70% / 0.3)" />
    <text x="40" y="26" text-anchor="middle">헌법</text>
    <rect x="92" y="0" width="80" height="40" rx="20" fill="hsl(252 82% 60% / 0.15)" stroke="hsl(252 88% 70% / 0.3)" />
    <text x="132" y="26" text-anchor="middle">민법</text>
    <rect x="184" y="0" width="80" height="40" rx="20" fill="hsl(252 82% 60% / 0.15)" stroke="hsl(252 88% 70% / 0.3)" />
    <text x="224" y="26" text-anchor="middle">형법</text>
    <rect x="276" y="0" width="120" height="40" rx="20" fill="hsl(40 92% 52% / 0.15)" stroke="hsl(40 92% 60% / 0.3)" />
    <text x="336" y="26" text-anchor="middle">일상 법률</text>
